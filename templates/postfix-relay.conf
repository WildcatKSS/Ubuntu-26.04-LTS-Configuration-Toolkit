# Postfix main.cf — installed by script 08-mail-alerting
# Variables substituted via envsubst:
#   ${HOSTNAME}, ${MAIL_DOMAIN}, ${SMTP_RELAY_HOST}, ${SMTP_RELAY_PORT}

myhostname = ${HOSTNAME}
mydomain   = ${MAIL_DOMAIN}
myorigin   = $mydomain

# Bind to loopback only — relay outbound mail through SMTP_RELAY_HOST
inet_interfaces = loopback-only
inet_protocols  = ipv4
mydestination   = $myhostname, localhost.$mydomain, localhost

# Relay configuration
relayhost            = [${SMTP_RELAY_HOST}]:${SMTP_RELAY_PORT}
smtp_tls_security_level = may
smtp_tls_loglevel    = 1

# Aliases
alias_maps      = hash:/etc/aliases
alias_database  = hash:/etc/aliases

# Misc safety
biff             = no
append_dot_mydomain = no
readme_directory = no
compatibility_level = 3.6

# Queue settings
maximal_queue_lifetime = 1d
bounce_queue_lifetime  = 1d
