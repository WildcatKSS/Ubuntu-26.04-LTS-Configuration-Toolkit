# Rsyslog custom rules — installed by script 07-monitoring
# /etc/rsyslog.d/99-custom.conf

# Authentication and authorization
auth,authpriv.*                  /var/log/auth.log

# Kernel messages
kern.warning;kern.err            /var/log/kernel-warnings.log

# Cron
cron.*                           /var/log/cron.log

# Stop processing certain noisy messages early
:msg, contains, "imklog"          stop
