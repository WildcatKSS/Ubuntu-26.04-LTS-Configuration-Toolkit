name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: ShellCheck + BATS
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck and BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: bash -n syntax check
        run: |
          set -e
          for f in scripts/*.sh lib/*.sh templates/*.sh main.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

      - name: ShellCheck
        run: |
          shellcheck -x -e SC1091,SC2034 scripts/*.sh lib/*.sh main.sh templates/daily-report.sh templates/disk-alert.sh

      - name: BATS tests
        run: |
          bats tests/
